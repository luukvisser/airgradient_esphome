# Plantower PMS5003 particulate sensor (PM1.0, PM2.5, PM10) with EPA correction algorithm.
# Default 2-minute duty cycle extends rated sensor lifespan. Configurable scaling + intercept
# calibration offsets. Depends on: pms5003_uart (UART bus from board package).

substitutions:
  pm_update_interval: "2min"

sensor:
  - platform: pmsx003
    # Default interval of updating every second, but changing to 30 seconds to extend life but keep fan spinning
    # PMS5003 https://esphome.io/components/sensor/pmsx003.html
    type: PMSX003
    uart_id: pms5003_uart
    pm_2_5:
      name: "PM2.5 Raw"
      id: pm_2_5_raw
      device_class: pm25  # Added to report properly to HomeKit
      disabled_by_default: true
      accuracy_decimals: 1
      icon: mdi:molecule
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_sensors
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
      icon: mdi:molecule
      accuracy_decimals: 1
      device_class: pm1  # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_10_0:
      name: "PM10.0"
      id: pm_10_0
      icon: mdi:molecule
      accuracy_decimals: 1
      device_class: pm10  # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_0_3um:
      name: "PM0.3"
      id: pm_0_3um
      icon: mdi:blur
      web_server:
        sorting_group_id: grp_sensors
    update_interval: $pm_update_interval

  - platform: template
    # Implements PM2.5 correction algorithm supported by AirGradient from EPA and optionally batch specific corrections
    # https://www.airgradient.com/documentation/correction-algorithms/
    # https://document.airnow.gov/airnow-fire-and-smoke-map-questions-and-answers.pdf
    name: "PM2.5"
    id: pm_2_5
    update_interval: $pm_update_interval
    device_class: pm25  # Added to report properly to HomeKit
    unit_of_measurement: µg/m³
    icon: mdi:molecule
    accuracy_decimals: 1
    state_class: measurement
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // https://www.airgradient.com/blog/low-readings-from-pms5003/
      // Correction for sensor batches after 20231030
      // Only use the batch/individual calibration if the default scaling and intercept are changed
      float pm_2_5_calibrated_low = id(pm_2_5_scaling_factor).state * id(pm_0_3um).state + id(pm_2_5_intercept).state;
      float pm_2_5_calibrated = 0;
      if (pm_2_5_calibrated_low < 31 && (id(pm_2_5_scaling_factor).state != 1.0f || id(pm_2_5_intercept).state != 0.0f)) {
        pm_2_5_calibrated = pm_2_5_calibrated_low;
      } else {
        pm_2_5_calibrated = id(pm_2_5_raw).state;
      }
      if (pm_2_5_calibrated < 0) {
        pm_2_5_calibrated = 0;
      }
      // EPA Formula
      float result = 0.0;
      if (pm_2_5_calibrated == 0.0) {
        return NAN; // raw sensor reading of 0 is a transient glitch, not valid data
      } else if (pm_2_5_calibrated < 30.0) {
        result = (0.524 * pm_2_5_calibrated) - (0.0862 * id(humidity_raw).state) + 5.75;
      } else if (pm_2_5_calibrated < 50.0) {
        result = (0.786 * (pm_2_5_calibrated / 20 - 3/2) + 0.524 * (1 - (pm_2_5_calibrated / 20 - 3/2))) * pm_2_5_calibrated - (0.0862 * id(humidity_raw).state) + 5.75;
      } else if (pm_2_5_calibrated < 210.0) {
        result = (0.786 * pm_2_5_calibrated) - (0.0862 * id(humidity_raw).state) + 5.75;
      } else if (pm_2_5_calibrated < 260.0) {
        result = (0.69 * (pm_2_5_calibrated / 50 - 21/5) + 0.786 * (1 - (pm_2_5_calibrated / 50 - 21/5))) * pm_2_5_calibrated - (0.0862 * id(humidity_raw).state * (1 - (pm_2_5_calibrated / 50 - 21/5))) + (2.966 * (pm_2_5_calibrated / 50 - 21/5)) + (5.75 * (1 - (pm_2_5_calibrated / 50 - 21/5))) + (8.84 * pow(10,-4) * pow(pm_2_5_calibrated,2) * (pm_2_5_calibrated / 50 - 21/5));
      } else {
        result = 2.966 + (0.69 * pm_2_5_calibrated) + (8.84 * pow(10,-4) * pow(pm_2_5_calibrated,2));
      }
      if (result <= 0.0) {
        return NAN; // EPA correction formula gives unphysical result (low PM + high humidity)
      } else {
        return result;
      }

number:
  - platform: template
    name: "PMS5003 PM2.5 Scaling Factor"
    id: pm_2_5_scaling_factor
    min_value: 0.5
    max_value: 2.0
    step: 0.01
    initial_value: 1.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:scale
    web_server:
      sorting_group_id: grp_pm25

  - platform: template
    name: "PMS5003 PM2.5 Intercept"
    id: pm_2_5_intercept
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:plus-minus-variant
    web_server:
      sorting_group_id: grp_pm25
