substitutions:
  pm_update_interval: "2min"

select:
  # PM2.5 correction algorithm. Mirrors the AirGradient Arduino library's
  # PMCorrectionAlgorithm enum (AgValue.cpp:820-857; PMS/PMS.cpp:329-367):
  #
  #   none                  - return raw PM2.5 atmospheric, no correction
  #   epa_2021              - EPA piecewise compensation by raw PM2.5 + RH
  #   custom                - sf * pm003 + intercept (slrCorrectionBy003Count)
  #   custom_via_pm25_raw   - sf * pm25_raw + intercept (slrCorrectionByPm25Raw)
  #   slr_batch             - low: sf*pm003+intercept (<31), else pm25_raw
  #                            (slrCorrection; covers factory_calibration and
  #                             cloud-delivered slr_* batch presets)
  #
  # The "use EPA on top of SLR" choice is exposed separately as the
  # `pm_2_5_use_epa` switch and matches Arduino's pmCorrection.useEPA.
  - platform: template
    name: "PM2.5 Correction Algorithm"
    id: pm_2_5_correction_algorithm
    options:
      - "none"
      - "epa_2021"
      - "custom"
      - "custom_via_pm25_raw"
      - "slr_batch"
    initial_option: "epa_2021"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: mdi:function-variant
    web_server:
      sorting_group_id: grp_pm25

switch:
  - platform: template
    name: "PM2.5 Apply EPA on top of SLR"
    id: pm_2_5_use_epa
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: config
    icon: mdi:function-variant
    web_server:
      sorting_group_id: grp_pm25

number:
  - platform: template
    name: "PMS5003 PM2.5 Scaling Factor"
    id: pm_2_5_scaling_factor
    min_value: 0.5
    max_value: 2.0
    step: 0.01
    initial_value: 1.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:scale
    web_server:
      sorting_group_id: grp_pm25

  - platform: template
    name: "PMS5003 PM2.5 Intercept"
    id: pm_2_5_intercept
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:plus-minus-variant
    web_server:
      sorting_group_id: grp_pm25

sensor:
  - platform: pmsx003
    # Default interval of updating every second, but changing to 30 seconds to extend life but keep fan spinning
    # PMS5003 https://esphome.io/components/sensor/pmsx003.html
    type: PMSX003
    uart_id: pms5003_uart
    pm_2_5:
      name: "PM2.5 Raw"
      id: pm_2_5_raw
      device_class: pm25  # Added to report properly to HomeKit
      disabled_by_default: true
      accuracy_decimals: 1
      icon: mdi:molecule
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_sensors
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
      icon: mdi:molecule
      accuracy_decimals: 1
      device_class: pm1  # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_10_0:
      name: "PM10.0"
      id: pm_10_0
      icon: mdi:molecule
      accuracy_decimals: 1
      device_class: pm10  # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_0_3um:
      name: "PM0.3"
      id: pm_0_3um
      icon: mdi:blur
      web_server:
        sorting_group_id: grp_sensors
    update_interval: $pm_update_interval

  - platform: template
    # PM2.5 correction algorithm dispatch. Mirrors AirGradient Arduino lib:
    # https://github.com/airgradienthq/arduino/blob/master/src/AgValue.cpp
    #   getCorrectedPM25() lines 820-857
    # https://github.com/airgradienthq/arduino/blob/master/src/PMS/PMS.cpp
    #   slrCorrection*       lines 329-367
    #   compensate (EPA)     line  385
    name: "PM2.5"
    id: pm_2_5
    update_interval: $pm_update_interval
    device_class: pm25
    unit_of_measurement: µg/m³
    icon: mdi:molecule
    accuracy_decimals: 1
    state_class: measurement
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      const float sf      = id(pm_2_5_scaling_factor).state;
      const float intc    = id(pm_2_5_intercept).state;
      const float pm25raw = id(pm_2_5_raw).state;
      const float pm003   = id(pm_0_3um).state;
      const float rh      = id(humidity_raw).state;
      const std::string algo = id(pm_2_5_correction_algorithm).state;
      const bool use_epa  = id(pm_2_5_use_epa).state;

      auto epa_compensate = [&](float pm) -> float {
        if (pm <= 0.0f) return 0.0f;
        float h = rh; if (h < 0) h = 0; if (h > 100) h = 100;
        if (pm < 30.0f) {
          return (0.524f * pm) - (0.0862f * h) + 5.75f;
        } else if (pm < 50.0f) {
          float k = pm / 20.0f - 3.0f/2.0f;
          return (0.786f * k + 0.524f * (1.0f - k)) * pm - (0.0862f * h) + 5.75f;
        } else if (pm < 210.0f) {
          return (0.786f * pm) - (0.0862f * h) + 5.75f;
        } else if (pm < 260.0f) {
          float k = pm / 50.0f - 21.0f/5.0f;
          return (0.69f * k + 0.786f * (1.0f - k)) * pm
                 - (0.0862f * h * (1.0f - k))
                 + (2.966f * k)
                 + (5.75f * (1.0f - k))
                 + (8.84e-4f * pm * pm * k);
        } else {
          return 2.966f + (0.69f * pm) + (8.84e-4f * pm * pm);
        }
      };

      float corrected = pm25raw;
      if (algo == "none") {
        corrected = pm25raw;
      } else if (algo == "epa_2021") {
        corrected = epa_compensate(pm25raw);
      } else if (algo == "custom") {
        // slrCorrectionBy003Count: sf*pm003 + intc, clamped at 0
        corrected = sf * pm003 + intc;
        if (corrected < 0) corrected = 0;
        if (use_epa) corrected = epa_compensate(corrected);
      } else if (algo == "custom_via_pm25_raw") {
        // slrCorrectionByPm25Raw: pm25==0 -> 0 else sf*pm25 + intc
        corrected = (pm25raw == 0.0f) ? 0.0f : (sf * pm25raw + intc);
        if (use_epa) corrected = epa_compensate(corrected);
      } else {  // slr_batch
        // slrCorrection: low <31 -> sf*pm003+intc, else fall back to raw
        float low = sf * pm003 + intc;
        corrected = (low < 31.0f) ? low : pm25raw;
        if (corrected < 0) corrected = 0;
        if (use_epa) corrected = epa_compensate(corrected);
      }
      if (corrected < 0.0f) corrected = 0.0f;
      return corrected;

  - platform: template
    # Depends on another sensor providing an ID of pm_2_5 such as a pms5003
    name: "PM2.5 AQI"
    id: pm_2_5_aqi
    device_class: aqi
    update_interval: 5 min
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // 2024 update from EPA https://www.epa.gov/system/files/documents/2024-02/pm-naaqs-air-quality-index-fact-sheet.pdf
      // https://en.wikipedia.org/wiki/Air_quality_index#Computing_the_AQI
      // Borrowed from https://github.com/kylemanna/sniffer/blob/master/esphome/sniffer_common.yaml
      if (isnan(id(pm_2_5).state)) return NAN;
      if (id(pm_2_5).state <= 9.0) {
      // good
      return((50.0 - 0.0) / (9.0 - 0.0) * (id(pm_2_5).state - 0.0) + 0.0);
      } else if (id(pm_2_5).state <= 35.4) {
      // moderate
      return((100.0 - 51.0) / (35.4 - 9.1) * (id(pm_2_5).state - 9.1) + 51.0);
      } else if (id(pm_2_5).state <= 55.4) {
      // usg
      return((150.0 - 101.0) / (55.4 - 35.5) * (id(pm_2_5).state - 35.5) + 101.0);
      } else if (id(pm_2_5).state <= 125.4) {
      // unhealthy
      return((200.0 - 151.0) / (125.4 - 55.5) * (id(pm_2_5).state - 55.5) + 151.0);
      } else if (id(pm_2_5).state <= 225.4) {
      // very unhealthy
      return((300.0 - 201.0) / (225.4 - 125.5) * (id(pm_2_5).state - 125.5) + 201.0);
      } else if (id(pm_2_5).state <= 325.4) {
      // hazardous
      return((500.0 - 301.0) / (325.4 - 225.5) * (id(pm_2_5).state - 225.5) + 301.0);
      } else {
      return(500);
      }
