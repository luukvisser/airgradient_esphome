font:
  - file: "gfonts://Open Sans"
    id: open_sans_14
    size: 14
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans"
    id: open_sans_10
    size: 10
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans"
    id: open_sans_20
    size: 18
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans"
    id: open_sans_34
    # Biggest font size possible for a two line layout.
    size: 34
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans@700"
    id: open_sans_bold_10
    size: 10
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'    
  - file: "gfonts://Open Sans@700"
    id: open_sans_bold_14
    size: 14
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans@700"
    id: open_sans_bold_18
    size: 18
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'
  - file: "gfonts://Open Sans@700"
    id: open_sans_bold_34
    size: 34
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/µ³'


display:
  - platform: ssd1306_i2c
    # https://esphome.io/components/display/ssd1306.html
    # Formatting reference: https://www.tutorialspoint.com/c_standard_library/c_function_printf.htm
    model: "SH1106 128x64"
    id: oled_display
    address: 0x3C
    pages:
      - id: airgradient_default
        # https://forum.airgradient.com/t/airgradient-one-customized-mallocarray-esphome-display/1328
        lambda: |-
          if (isnan(id(temp).state)) {
            it.printf(0, -4, id(open_sans_14), "-");
          } else if (id(display_in_f).current_option() == "°F") {
            it.printf(0, -4, id(open_sans_14), "%.1f°F", id(temp).state*9/5+32);
          } else {
            it.printf(0, -4, id(open_sans_14), "%.1f°C", id(temp).state);
          }
          it.printf(128, -4, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(humidity).state) ? "-" : "%.0f%%", id(humidity).state);
          it.line(0,17-4,128,17-4);
          it.printf(0,19-4, id(open_sans_10), "CO2");
          it.printf(0,27, id(open_sans_bold_18), isnan(id(co2).state) ? "-" : "%.0f", id(co2).state);
          it.printf(0,50, id(open_sans_10), "ppm");
          it.line(52,19-4,52,64-4);
          it.printf(56, 19-4, id(open_sans_10), "PM2.5");
          if (isnan(id(pm_2_5).state)) {
            it.printf(56, 27, id(open_sans_bold_18), "-");
          } else if (id(pm_2_5).state >= 100.0f) {
            it.printf(56, 27, id(open_sans_bold_18), "%.0f", id(pm_2_5).state);
          } else {
            it.printf(56, 27, id(open_sans_bold_18), "%.1f", id(pm_2_5).state);
          }
          it.printf(56, 50, id(open_sans_10), "µg/m³");
          it.line(97,19-4,97,64-4);
          it.printf(101,18-4, id(open_sans_10), "VOC");
          it.printf(101,29-4, id(open_sans_bold_10), isnan(id(voc).state) ? "-" : "%.0f", id(voc).state);
          it.printf(101,40-4, id(open_sans_10), "NOx");
          it.printf(101,51-4, id(open_sans_bold_10), isnan(id(nox).state) ? "-" : "%.0f", id(nox).state);
      - id: boot
        lambda: |-
          it.printf(0, 0, id(open_sans_bold_14), "AirGradient ONE");
          it.printf(0, 20, id(open_sans_10), "MAC: %s", get_mac_address().c_str());
          it.printf(0, 35, id(open_sans_10), "Firmware: $config_version");
          auto ver = id(esphome_version).state;
          auto ver_sp = ver.find(' ');
          if (ver_sp != std::string::npos) ver = ver.substr(0, ver_sp);
          it.printf(0, 50, id(open_sans_10), "ESPHome: %s", ver.c_str());
      - id: summary1
        lambda: |-
          it.printf(0, 0, id(open_sans_14), "CO2:");
          it.printf(128, 0, id(open_sans_bold_14), TextAlign::TOP_RIGHT, isnan(id(co2).state) ? "- ppm" : "%.0f ppm", id(co2).state);
          it.printf(0, 16, id(open_sans_14), "PM2.5:");
          it.printf(128, 16, id(open_sans_bold_14), TextAlign::TOP_RIGHT, isnan(id(pm_2_5).state) ? "- µg/m³" : "%.0f µg/m³", id(pm_2_5).state);
          it.printf(0, 32, id(open_sans_14), "Temp:");
          if (isnan(id(temp).state)) {
            it.printf(128, 32, id(open_sans_14), TextAlign::TOP_RIGHT, "-");
          } else if (id(display_in_f).current_option() == "°F") {
            it.printf(128, 32, id(open_sans_14), TextAlign::TOP_RIGHT, "%.1f°F", id(temp).state*9/5+32);
          } else {
            it.printf(128, 32, id(open_sans_14), TextAlign::TOP_RIGHT, "%.1f°C", id(temp).state);
          }
          it.printf(0, 48, id(open_sans_14), "Humidity:");
          it.printf(128, 48, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(humidity).state) ? "-" : "%.1f%%", id(humidity).state);
      - id: summary2
        lambda: |-
          it.printf(0, 0, id(open_sans_14), "CO2:");
          it.printf(128, 0, id(open_sans_bold_14), TextAlign::TOP_RIGHT, isnan(id(co2).state) ? "- ppm" : "%.0f ppm", id(co2).state);
          it.printf(0, 16, id(open_sans_14), "PM2.5:");
          it.printf(128, 16, id(open_sans_bold_14), TextAlign::TOP_RIGHT, isnan(id(pm_2_5).state) ? "- µg/m³" : "%.0f µg/m³", id(pm_2_5).state);
          it.printf(0, 32, id(open_sans_14), "VOC:");
          it.printf(128, 32, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(voc).state) ? "-" : "%.0f", id(voc).state);
          it.printf(0, 48, id(open_sans_14), "NOx:");
          it.printf(128, 48, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(nox).state) ? "-" : "%.0f", id(nox).state);
      - id: huge_no_units
        lambda: |-
          it.printf(0, 0 - 8, id(open_sans_bold_34), TextAlign::TOP_LEFT, isnan(id(co2).state) ? "-" : "%.0f", id(co2).state);
          it.printf(it.get_width(), 0 - 8, id(open_sans_34), TextAlign::TOP_RIGHT, isnan(id(humidity).state) ? "-" : "%.0f", id(humidity).state);
          it.printf(0, 64 + 8, id(open_sans_bold_34), TextAlign::BOTTOM_LEFT, isnan(id(pm_2_5).state) ? "-" : "%.0f", id(pm_2_5).state);
          if (isnan(id(temp).state)) {
            it.printf(it.get_width(), 64 + 8, id(open_sans_34), TextAlign::BOTTOM_RIGHT, "-");
          } else if (id(display_in_f).current_option() == "°F") {
            it.printf(it.get_width(), 64 + 8, id(open_sans_34), TextAlign::BOTTOM_RIGHT, "%.1f", id(temp).state*9/5+32);
          } else {
            it.printf(it.get_width(), 64 + 8, id(open_sans_34), TextAlign::BOTTOM_RIGHT, "%.1f", id(temp).state);
          }
      - id: air_quality
        lambda: |-
          it.printf(0, 13, id(open_sans_14), "CO2");
          it.printf(128, 6, id(open_sans_bold_18), TextAlign::TOP_RIGHT, isnan(id(co2).state) ? "- ppm" : "%.0f ppm", id(co2).state);
          it.printf(0, 41, id(open_sans_14), "PM2");
          it.printf(128, 34, id(open_sans_bold_18), TextAlign::TOP_RIGHT, isnan(id(pm_2_5).state) ? "- µg/m³" : "%.0f µg/m³", id(pm_2_5).state);
      - id: air_temp
        lambda: |-
          it.printf(0, 13, id(open_sans_14), "Temp");
          if (isnan(id(temp).state)) {
            it.printf(128, 6, id(open_sans_20), TextAlign::TOP_RIGHT, "-");
          } else if (id(display_in_f).current_option() == "°F") {
            it.printf(128, 6, id(open_sans_20), TextAlign::TOP_RIGHT, "%.1f°F", id(temp).state*9/5+32);
          } else {
            it.printf(128, 6, id(open_sans_20), TextAlign::TOP_RIGHT, "%.1f°C", id(temp).state);
          }
          it.printf(0, 41, id(open_sans_14), "Humid");
          it.printf(128, 34, id(open_sans_20), TextAlign::TOP_RIGHT, isnan(id(humidity).state) ? "-" : "%.1f%%", id(humidity).state);
      - id: air_voc
        lambda: |-
          it.printf(0, 6, id(open_sans_20), "VOC:");
          it.printf(128, 6, id(open_sans_20), TextAlign::TOP_RIGHT, isnan(id(voc).state) ? "-" : "%.0f", id(voc).state);
          it.printf(0, 34, id(open_sans_20), "NOx:");
          it.printf(128, 34, id(open_sans_20), TextAlign::TOP_RIGHT, isnan(id(nox).state) ? "-" : "%.0f", id(nox).state);
      - id: combo
        lambda: |-
          if (isnan(id(temp).state)) {
            it.printf(0, 0, id(open_sans_14), "-");
          } else if (id(display_in_f).current_option() == "°F") {
            it.printf(0, 0, id(open_sans_14), "%.1f °F", id(temp).state*9/5+32);
          } else {
            it.printf(0, 0, id(open_sans_14), "%.1f °C", id(temp).state);
          }
          it.printf(128, 0, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(humidity).state) ? "-" : "%.1f%%", id(humidity).state);
          it.printf(0, 16, id(open_sans_bold_14), isnan(id(pm_2_5).state) ? "- µg/m³" : "%.0f µg/m³", id(pm_2_5).state);
          it.printf(128, 16, id(open_sans_bold_14), TextAlign::TOP_RIGHT, isnan(id(co2).state) ? "- ppm" : "%.0f ppm", id(co2).state);
          it.printf(0, 32, id(open_sans_14), isnan(id(voc).state) ? "VOC: -" : "VOC: %.0f", id(voc).state);
          it.printf(128, 32, id(open_sans_14), TextAlign::TOP_RIGHT, isnan(id(nox).state) ? "NOx: -" : "NOx: %.0f", id(nox).state);
          it.printf(0, 48, id(open_sans_14), isnan(id(pm_2_5_aqi).state) ? "AQI: -" : "AQI: %.0f", id(pm_2_5_aqi).state);
      - id: screen_off
        # ESPHome's public SSD1306 API on this build does not expose a hardware
        # power-off. Instead we draw nothing — with auto_clear on (the default)
        # every pixel is unlit, which captures the practical OLED-longevity
        # benefit since pixel aging happens while pixels are lit.
        lambda: |-
          it.fill(COLOR_OFF);


script:
  - id: update_display_page
    # Show the page matching the current select value, or the boot page during startup.
    then:
      - if:
          condition:
            switch.is_on: display_boot_page
          then:
            - display.page.show: boot
          else:
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "AirGradient Default";
                then:
                  - display.page.show: airgradient_default
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "Env Summary";
                then:
                  - display.page.show: summary1
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "VOC Summary";
                then:
                  - display.page.show: summary2
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "Large Numbers";
                then:
                  - display.page.show: huge_no_units
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "CO2 & PM2.5";
                then:
                  - display.page.show: air_quality
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "Temp & Humidity";
                then:
                  - display.page.show: air_temp
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "VOC & NOx";
                then:
                  - display.page.show: air_voc
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "Combo";
                then:
                  - display.page.show: combo
            - if:
                condition:
                  lambda: return id(display_page_select).current_option() == "Off";
                then:
                  - display.page.show: screen_off
      - component.update: oled_display


interval:
  - interval: 10s
    startup_delay: 1s
    # Dismiss the boot page after startup
    then:
      if:
        condition:
          switch.is_on: display_boot_page
        then:
          switch.turn_off: display_boot_page

  - interval: 5s
    # Refresh the display with current sensor values
    then:
      - script.execute: update_display_page


switch:
  - platform: template
    id: display_boot_page
    restore_mode: ALWAYS_ON
    optimistic: True
    internal: true


select:
  - platform: template
    name: "Display Temperature Unit"
    id: display_in_f
    options:
      - "°C"
      - "°F"
    initial_option: "°C"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:thermometer"
    web_server:
      sorting_group_id: grp_display

  - platform: template
    name: "Display Page"
    id: display_page_select
    options:
      - "AirGradient Default"
      - "Env Summary"
      - "VOC Summary"
      - "Large Numbers"
      - "CO2 & PM2.5"
      - "Temp & Humidity"
      - "VOC & NOx"
      - "Combo"
      - "Off"
    initial_option: "AirGradient Default"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:monitor"
    web_server:
      sorting_group_id: grp_display
    set_action:
      - script.execute: update_display_page

number:
  - platform: template
    # https://esphome.io/components/number/template.html
    name: "Display Contrast %"
    icon: "mdi:lightbulb"
    id: display_contrast
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    optimistic: true
    restore_value: true
    mode: slider
    on_value:
      then:
        # https://www.reddit.com/r/Esphome/comments/sy1d1s/how_to_write_a_lamba_to_change_the_contrast_of/
        lambda: id(oled_display).set_contrast(id(display_contrast).state / 100.0);
    entity_category: config
    web_server:
      sorting_group_id: grp_display
