# Plantower PMS5003T particulate + temperature/humidity sensor with EPA PM2.5 correction.
# Use instead of sensor_pms5003.yaml + sensor_sht40.yaml for boards with a PMS5003T
# (e.g. AirGradient Open Air). Provides the same pm_2_5, pm_2_5_aqi, temp, and humidity
# IDs as the two packages it replaces, so the rest of the config is drop-in compatible.
# Depends on: pms5003_uart (UART bus from board package).
---
substitutions:
  # Hardware readout interval — how often the PMS is polled over UART.
  pm_update_interval: "30s"
  # HA publish/update interval — throttle_average filters average the 30s readouts
  # and emit every 60s, so PM state updates are halved without slowing the readout.
  pm_publish_interval: "60s"
sensor:
  - platform: pmsx003
    # Readout stays at 30s ($pm_update_interval) to keep the fan spinning; PM publishing is
    # decoupled to 60s ($pm_publish_interval) via throttle_average filters on each PM output.
    # Temperature/humidity are left at the 30s readout cadence.
    # PMS5003T https://esphome.io/components/sensor/pmsx003.html
    type: PMS5003T
    uart_id: pms5003_uart
    pm_2_5:
      name: "PM2.5 Raw"
      id: pm_2_5_raw
      device_class: pm25
      disabled_by_default: true
      accuracy_decimals: 2
      icon: mdi:molecule
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm1
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_10_0:
      name: "PM10.0"
      id: pm_10_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm10
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_0_3um:
      name: "PM0.3"
      id: pm_0_3um
      icon: mdi:blur
      accuracy_decimals: 0
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    temperature:
      name: "Temperature Raw"
      id: temp_raw
      disabled_by_default: true
      entity_category: diagnostic
    humidity:
      name: "Humidity Raw"
      id: humidity_raw
      disabled_by_default: true
      entity_category: diagnostic
    update_interval: $pm_update_interval
  - platform: template
    # Implements PM2.5 correction algorithm supported by AirGradient from EPA and optionally batch specific corrections
    # https://www.airgradient.com/documentation/correction-algorithms/
    # https://document.airnow.gov/airnow-fire-and-smoke-map-questions-and-answers.pdf
    name: "PM2.5"
    id: pm_2_5
    # Reads the 60s-averaged raw values, so compute the correction once per publish window.
    update_interval: $pm_publish_interval
    device_class: pm25
    unit_of_measurement: µg/m³
    icon: mdi:molecule
    accuracy_decimals: 2
    state_class: measurement
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // https://www.airgradient.com/blog/low-readings-from-pms5003/
      // Correction for sensor batches after 20231030
      // Only use the batch/individual calibration if the default scaling and intercept are changed
      // Use double precision throughout to avoid losing accuracy across chained operations.
      const double pm_0_3um_raw = id(pm_0_3um).state;
      const double pm_2_5_sensor = id(pm_2_5_raw).state;
      const double humidity = id(humidity_raw).state;
      const double scaling = id(pm_2_5_scaling_factor).state / 100.0;  // stored ×100 for UI display
      const double intercept = id(pm_2_5_intercept).state;
      double pm_2_5_calibrated_low = scaling * pm_0_3um_raw + intercept;
      double pm_2_5_calibrated = 0;
      if (pm_2_5_calibrated_low < 31 && (scaling != 1.0 || intercept != 0.0)) {
        pm_2_5_calibrated = pm_2_5_calibrated_low;
      } else {
        pm_2_5_calibrated = pm_2_5_sensor;
      }
      if (pm_2_5_calibrated < 0) {
        pm_2_5_calibrated = 0;
      }
      // EPA Formula
      double result = 0.0;
      if (pm_2_5_calibrated < 30.0) {
        result = (0.524 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 50.0) {
        result = (0.786 * (pm_2_5_calibrated / 20.0 - 1.5) + 0.524 * (1.0 - (pm_2_5_calibrated / 20.0 - 1.5))) * pm_2_5_calibrated - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 210.0) {
        result = (0.786 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 260.0) {
        result = (0.69 * (pm_2_5_calibrated / 50.0 - 4.2) + 0.786 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) * pm_2_5_calibrated - (0.0862 * humidity * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (2.966 * (pm_2_5_calibrated / 50.0 - 4.2)) + (5.75 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0) * (pm_2_5_calibrated / 50.0 - 4.2));
      } else {
        result = 2.966 + (0.69 * pm_2_5_calibrated) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0));
      }
      // EPA formula can go negative at high humidity + low PM; clamp to physical floor.
      return result < 0.0 ? 0.0 : result;
  - platform: template
    name: "PM2.5 AQI"
    id: pm_2_5_aqi
    device_class: aqi
    # Derived from the corrected PM2.5; follow the same 60s publish cadence.
    update_interval: $pm_publish_interval
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // 2024 update from EPA https://www.epa.gov/system/files/documents/2024-02/pm-naaqs-air-quality-index-fact-sheet.pdf
      // https://en.wikipedia.org/wiki/Air_quality_index#Computing_the_AQI
      if (isnan(id(pm_2_5).state)) return NAN;
      if (id(pm_2_5).state <= 9.0) {
      return((50.0 - 0.0) / (9.0 - 0.0) * (id(pm_2_5).state - 0.0) + 0.0);
      } else if (id(pm_2_5).state <= 35.4) {
      return((100.0 - 51.0) / (35.4 - 9.1) * (id(pm_2_5).state - 9.1) + 51.0);
      } else if (id(pm_2_5).state <= 55.4) {
      return((150.0 - 101.0) / (55.4 - 35.5) * (id(pm_2_5).state - 35.5) + 101.0);
      } else if (id(pm_2_5).state <= 125.4) {
      return((200.0 - 151.0) / (125.4 - 55.5) * (id(pm_2_5).state - 55.5) + 151.0);
      } else if (id(pm_2_5).state <= 225.4) {
      return((300.0 - 201.0) / (225.4 - 125.5) * (id(pm_2_5).state - 125.5) + 201.0);
      } else if (id(pm_2_5).state <= 325.4) {
      return((400.0 - 301.0) / (325.4 - 225.5) * (id(pm_2_5).state - 225.5) + 301.0);
      } else if (id(pm_2_5).state <= 500.4) {
      return((500.0 - 401.0) / (500.4 - 325.5) * (id(pm_2_5).state - 325.5) + 401.0);
      } else {
      return(500);
      }
  - platform: copy
    source_id: temp_raw
    name: "Temperature"
    id: temp
    device_class: temperature
    state_class: measurement
    entity_category: ""
    # https://www.airgradient.com/documentation/correction-algorithms/
    filters:
      - lambda: |-
          if (x < 10.0) return (x * 1.327) - 6.738;
          return (x * 1.181) - 5.113;
    web_server:
      sorting_group_id: grp_sensors
  - platform: copy
    source_id: humidity_raw
    name: "Humidity"
    id: humidity
    device_class: humidity
    state_class: measurement
    entity_category: ""
    # https://www.airgradient.com/documentation/correction-algorithms/
    filters:
      - lambda: |-
          float result = x * 1.259f + 7.34f;
          if (result > 100) return 100;
          return result;
    web_server:
      sorting_group_id: grp_sensors
number:
  - platform: template
    # Stored as the calibration factor × 100 so the web UI shows all significant digits
    # (ESPHome derives display decimals from `step` via %.5g, which collapses to 0 below
    # 1e-4 — see esphome/esphome#10637). The lambda divides by 100 on read.
    # Sentinel: 100 (factor 1.0, intercept 0.0) disables batch calibration — raw PM2.5 is
    # used. For AirGradient batch calibration (post-2023-10-30) use the Batch Preset select
    # below; raw factors are ~0.02–0.04 (pm_0_3um → µg/m³), i.e. ~2–4 in this ×100 scale.
    name: "PMS5003 PM2.5 Scaling Factor (×100)"
    id: pm_2_5_scaling_factor
    min_value: 0.001
    max_value: 200.0
    step: 0.001
    initial_value: 100.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:scale
    web_server:
      sorting_group_id: grp_pm25
  - platform: template
    name: "PMS5003 PM2.5 Intercept"
    id: pm_2_5_intercept
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:plus-minus-variant
    web_server:
      sorting_group_id: grp_pm25
select:
  - platform: template
    name: "PMS5003 PM2.5 Batch Preset"
    id: pm_2_5_batch_preset
    options:
      - "None (manual)"
      - "PMS5003_20231030"
      - "PMS5003_20231218"
      - "PMS5003_20240104"
      - "PMS5003_20240826"
      - "PMS5003_20250116"
      - "PMS5003_20250530"
    initial_option: "None (manual)"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: mdi:format-list-bulleted
    web_server:
      sorting_group_id: grp_pm25
    set_action:
      - lambda: |-
          float s = 100.0f;  // sentinel: factor 1.0 (× 100) = no batch calibration
          if (x == "PMS5003_20231030")      s = 2.838f;
          else if (x == "PMS5003_20231218") s = 3.525f;
          else if (x == "PMS5003_20240104") s = 2.896f;
          else if (x == "PMS5003_20240826") s = 3.863f;
          else if (x == "PMS5003_20250116") s = 2.983f;
          else if (x == "PMS5003_20250530") s = 2.411f;
          id(pm_2_5_scaling_factor).make_call().set_value(s).perform();
          id(pm_2_5_intercept).make_call().set_value(0.0f).perform();
