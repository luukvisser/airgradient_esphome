# Uploads sensor readings to the AirGradient cloud every 1 minute.
# Payload mirrors the official Arduino library's cloud-mode buildIndoor() path:
#   https://github.com/airgradienthq/arduino/blob/master/src/AgValue.cpp
#
# Requires the device's MAC-based serial number to be registered at app.airgradient.com.
# Provides an "Upload to AirGradient Dashboard" toggle switch.
#
# Notes on parity with the Arduino firmware:
#   - Interval is 1 min (WIFI_TRANSMISSION_INTERVAL = 1 * 60000 ms).
#   - `boot` is a persisted boot counter incremented once per power-up, matching
#     Arduino's bootCount. Previous ESPHome behavior sent uptime-in-minutes.
#   - `pm02Compensated`, `atmpCompensated`, `rhumCompensated` are local-server-only
#     fields in the Arduino lib. Cloud applies its own correction on raw values.
#   - `resetReason` and `freeHeap` are cloud-only diagnostic fields.
#   - `tvocRaw` / `noxRaw` require a custom SGP4x component that exposes raw SRAW
#     ticks; left commented until that component is available.
---
globals:
  - id: boot_count
    type: int
    restore_value: true
    initial_value: '0'
esphome:
  on_boot:
    - priority: 600 # Increment before any other on_boot handler reads it.
      then:
        - lambda: id(boot_count) += 1;
        - lambda: id(boot_count_sensor).publish_state(id(boot_count));
    - priority: 200 # Network connections setup
      then:
        if:
          condition:
            switch.is_on: upload_airgradient
          then:
            - wait_until:
                condition:
                  wifi.connected:
                timeout: 30s
            - http_request.post:
                # Boot ping: wifi_signal sensor has not reported yet, so
                # the Arduino library hard-codes -50 as a placeholder to show
                # the device as "online" on the dashboard immediately.
                url: !lambda |-
                  return "https://hw.airgradient.com/sensors/airgradient:" + get_mac_address() + "/measures";
                request_headers:
                  Content-Type: application/json
                json:
                  wifi: !lambda return to_string(-50);
                  boot: !lambda return to_string(id(boot_count));
http_request:
  # https://esphome.io/components/http_request.html
  watchdog_timeout: 30s
sensor:
  - platform: template
    name: "Boot Count"
    id: boot_count_sensor
    accuracy_decimals: 0
    state_class: total_increasing
    icon: mdi:counter
    entity_category: diagnostic
    update_interval: never
    web_server:
      sorting_group_id: grp_system
switch:
  - platform: template
    name: "Upload to AirGradient Dashboard"
    id: upload_airgradient
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: config
    web_server:
      sorting_group_id: grp_system
interval:
  - interval: 1min
    then:
      if:
        condition:
          and:
            - switch.is_on: upload_airgradient
            # Skip when WiFi is down — avoids a failed TCP attempt that would
            # block the loop for up to 7 s and burn a watchdog extension.
            - wifi.connected:
        then:
          - http_request.post:
              # https://api.airgradient.com/public/docs/api/v1/
              # AirGradient URL with the MAC address all lower case
              url: !lambda |-
                return "https://hw.airgradient.com/sensors/airgradient:" + get_mac_address() + "/measures";
              request_headers:
                Content-Type: application/json
              # Build JSON manually so NaN sensor values (sensor not yet ready
              # or a transient read error) are omitted rather than sent as the
              # string "nan", which the API rejects with a 4xx error.
              # wifi always present: use -50 placeholder if the 60 s WiFi-signal
              # update hasn't fired yet (matches boot-ping behaviour).
              body: !lambda |-
                std::string j = "{";
                j += "\"wifi\":" + to_string(isnan(id(wifi_dbm).state) ? -50 : (int)id(wifi_dbm).state);
                if (!isnan(id(co2).state)) j += ",\"rco2\":" + to_string((int)id(co2).state);
                if (!isnan(id(pm_1_0).state)) j += ",\"pm01\":" + to_string((int)id(pm_1_0).state);
                if (!isnan(id(pm_2_5_raw).state)) j += ",\"pm02\":" + to_string(id(pm_2_5_raw).state);
                if (!isnan(id(pm_10_0).state)) j += ",\"pm10\":" + to_string((int)id(pm_10_0).state);
                if (!isnan(id(pm_0_3um).state)) j += ",\"pm003Count\":" + to_string((int)id(pm_0_3um).state);
                if (!isnan(id(temp_raw).state)) j += ",\"atmp\":" + to_string(id(temp_raw).state);
                if (!isnan(id(humidity_raw).state)) j += ",\"rhum\":" + to_string(id(humidity_raw).state);
                if (!isnan(id(voc).state)) j += ",\"tvocIndex\":" + to_string((int)id(voc).state);
                if (!isnan(id(nox).state)) j += ",\"noxIndex\":" + to_string((int)id(nox).state);
                j += ",\"boot\":" + to_string(id(boot_count));
                j += ",\"resetReason\":" + to_string((int)esp_reset_reason());
                j += ",\"freeHeap\":" + to_string((int)heap_caps_get_free_size(MALLOC_CAP_8BIT));
                j += "}";
                return j;
              on_response:
                then:
                  - lambda: |-
                      if (response->status_code < 200 || response->status_code >= 300)
                        ESP_LOGW("airgradient", "AG upload failed: HTTP %d", response->status_code);
              on_error:
                then:
                  - logger.log:
                      level: WARN
                      format: "AirGradient upload: network error"
