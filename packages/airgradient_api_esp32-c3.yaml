# Uploads measurements to the AirGradient cloud (hw.airgradient.com).
# Payload mirrors the official Arduino library's cloud-mode buildIndoor()
# / buildPMS(): https://github.com/airgradienthq/arduino/blob/master/src/AgValue.cpp
#
# Notes on parity with the Arduino firmware:
#   - Interval is 1 min (WIFI_TRANSMISSION_INTERVAL = 1 * 60000 ms).
#   - `boot` is a persisted boot counter, not uptime. Matches Arduino's
#     bootCount which is incremented once per power-up.
#   - `pm02Compensated`, `atmpCompensated`, `rhumCompensated` are NOT sent
#     to the cloud — those are local-server-only fields in the Arduino lib.
#     Cloud applies its own correction algorithm to the raw values.
#   - `resetReason` and `freeHeap` are cloud-only diagnostic fields.
#   - `tvocRaw` / `noxRaw` come from the local sgp4x fork in
#     `components/sgp4x` which adds raw SRAW outputs. Despite the name,
#     these are humidity- and temperature-compensated by the SGP41 chip
#     (RH/Temp ticks are passed into MEASURE_RAW); "raw" only means
#     pre-gas-index-algorithm. Matches the Arduino library's tvocRaw/noxRaw.

globals:
  - id: boot_count
    type: int
    restore_value: true
    initial_value: '0'

esphome:
  on_boot:
    - priority: 600  # Increment counter before any other on_boot uses it.
      then:
        - lambda: id(boot_count) += 1;
        - lambda: id(boot_count_sensor).publish_state(id(boot_count));

    - priority: 200  # Network connections setup
      then:
        if:
          condition:
            switch.is_on: upload_airgradient
          then:
          - http_request.post:
              # Boot ping: the wifi_signal sensor has not reported yet, so
              # the Arduino library hard-codes -50 as a placeholder to make
              # the device show as "online" on the dashboard immediately.
              url: !lambda |-
                return "https://hw.airgradient.com/sensors/airgradient:" + get_mac_address() + "/measures";
              request_headers:
                  Content-Type: application/json
              json:
                wifi: !lambda return to_string(-50);
                boot: !lambda return to_string(id(boot_count));

interval:
  - interval: 1min
    then:
      if:
        condition:
          switch.is_on: upload_airgradient
        then:
          - http_request.post:
              # https://api.airgradient.com/public/docs/api/v1/
              # AirGradient URL with the MAC address all lower case
              url: !lambda |-
                return "https://hw.airgradient.com/sensors/airgradient:" + get_mac_address() + "/measures";
              request_headers:
                  Content-Type: application/json
              json:
                wifi: !lambda return to_string(id(wifi_dbm).state);
                rco2: !lambda return to_string(id(co2).state);
                pm01: !lambda return to_string(id(pm_1_0).state);
                pm02: !lambda return to_string(id(pm_2_5_raw).state);
                pm10: !lambda return to_string(id(pm_10_0).state);
                pm003Count: !lambda return to_string(id(pm_0_3um).state);
                atmp: !lambda return to_string(id(temp_raw).state);
                rhum: !lambda return to_string(id(humidity_raw).state);
                tvocIndex: !lambda return to_string(id(voc).state);
                tvocRaw: !lambda return to_string(id(voc_raw).state);
                noxIndex: !lambda return to_string(id(nox).state);
                noxRaw: !lambda return to_string(id(nox_raw).state);
                boot: !lambda return to_string(id(boot_count));
                resetReason: !lambda |-
                  return to_string((int) esp_reset_reason());
                freeHeap: !lambda |-
                  return to_string((int) heap_caps_get_free_size(MALLOC_CAP_8BIT));

switch:
  - platform: template
    name: "Upload to AirGradient Dashboard"
    id: upload_airgradient
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: True
    entity_category: config
    web_server:
      sorting_group_id: grp_system

sensor:
  - platform: template
    name: "Boot Count"
    id: boot_count_sensor
    accuracy_decimals: 0
    icon: mdi:counter
    entity_category: diagnostic
    update_interval: never
    web_server:
      sorting_group_id: grp_system

http_request:
  # Used to support POST request to send data to AirGradient
  # https://esphome.io/components/http_request.html
  verify_ssl: false  # Must be explicitly set to false when using Arduino framework
  watchdog_timeout: 30s  # Slow response from API server can cause watchdog to reboot device
