# Plantower PMS5003 particulate sensor (PM1.0, PM2.5, PM10) with EPA correction algorithm.
# Default 2-minute duty cycle extends rated sensor lifespan. Configurable scaling + intercept
# calibration offsets. Depends on: pms5003_uart (UART bus from board package).
---
substitutions:
  # Hardware readout interval — how often the PMS is polled over UART.
  pm_update_interval: "30s"
  # HA publish/update interval — throttle_average filters average the 30s readouts
  # and emit every 60s, so state updates are halved without slowing the readout.
  pm_publish_interval: "60s"
sensor:
  - platform: pmsx003
    # AirGradient native firmware reads every 2s (continuous active mode, fan never stops).
    # Readout stays at 30s ($pm_update_interval) to keep the fan spinning continuously vs the
    # 1s default; 2min+ stops the fan between polls, requiring ~30s spin-up and causing
    # unstable/missed readings. Publishing is decoupled to 60s ($pm_publish_interval) via
    # throttle_average filters on each PM output to reduce HA state churn.
    # PMS5003 https://esphome.io/components/sensor/pmsx003.html
    type: PMSX003
    uart_id: pms5003_uart
    pm_2_5:
      name: "PM2.5 Raw"
      id: pm_2_5_raw
      device_class: pm25 # Added to report properly to HomeKit
      disabled_by_default: true
      accuracy_decimals: 2
      icon: mdi:molecule
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm1 # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_10_0:
      name: "PM10.0"
      id: pm_10_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm10 # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    pm_0_3um:
      name: "PM0.3"
      id: pm_0_3um
      icon: mdi:blur
      # Particle count per 0.1L of air — integer by nature, no decimals
      accuracy_decimals: 0
      web_server:
        sorting_group_id: grp_sensors
      filters:
        - throttle_average: $pm_publish_interval
    update_interval: $pm_update_interval
  - platform: template
    # Implements PM2.5 correction algorithm supported by AirGradient from EPA and optionally batch specific corrections
    # https://www.airgradient.com/documentation/correction-algorithms/
    # https://document.airnow.gov/airnow-fire-and-smoke-map-questions-and-answers.pdf
    name: "PM2.5"
    id: pm_2_5
    # Reads the 60s-averaged raw values, so compute the correction once per publish window.
    update_interval: $pm_publish_interval
    device_class: pm25 # Added to report properly to HomeKit
    unit_of_measurement: µg/m³
    icon: mdi:molecule
    accuracy_decimals: 2
    state_class: measurement
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // https://www.airgradient.com/blog/low-readings-from-pms5003/
      // Correction for sensor batches after 20231030
      // Only use the batch/individual calibration if the default scaling and intercept are changed
      // Use double precision throughout to avoid losing accuracy across chained operations.
      const double pm_0_3um_raw = id(pm_0_3um).state;
      const double pm_2_5_sensor = id(pm_2_5_raw).state;
      const double humidity = id(humidity_raw).state;
      const double scaling = id(pm_2_5_scaling_factor).state;
      const double intercept = id(pm_2_5_intercept).state;
      double pm_2_5_calibrated_low = scaling * pm_0_3um_raw + intercept;
      double pm_2_5_calibrated = 0;
      if (pm_2_5_calibrated_low < 31 && (scaling != 1.0 || intercept != 0.0)) {
        pm_2_5_calibrated = pm_2_5_calibrated_low;
      } else {
        pm_2_5_calibrated = pm_2_5_sensor;
      }
      if (pm_2_5_calibrated < 0) {
        pm_2_5_calibrated = 0;
      }
      // EPA Formula
      double result = 0.0;
      if (pm_2_5_calibrated < 30.0) {
        result = (0.524 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 50.0) {
        result = (0.786 * (pm_2_5_calibrated / 20.0 - 1.5) + 0.524 * (1.0 - (pm_2_5_calibrated / 20.0 - 1.5))) * pm_2_5_calibrated - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 210.0) {
        result = (0.786 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 260.0) {
        result = (0.69 * (pm_2_5_calibrated / 50.0 - 4.2) + 0.786 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) * pm_2_5_calibrated - (0.0862 * humidity * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (2.966 * (pm_2_5_calibrated / 50.0 - 4.2)) + (5.75 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0) * (pm_2_5_calibrated / 50.0 - 4.2));
      } else {
        result = 2.966 + (0.69 * pm_2_5_calibrated) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0));
      }
      // EPA formula can go negative at high humidity + low PM; clamp to physical floor.
      return result < 0.0 ? 0.0 : result;
  - platform: aqi
    # https://esphome.io/components/sensor/aqi/
    name: "PM2.5 AQI"
    id: pm_2_5_aqi
    pm_2_5: pm_2_5
    pm_10_0: pm_10_0
    calculation_type: AQI
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_sensors
number:
  - platform: template
    # Sentinel: 1.0 (with intercept 0.0) disables batch calibration — raw PM2.5 is used.
    # For AirGradient batch-specific calibration (post-2023-10-30), use the Batch Preset
    # select below instead of entering manually; factors are ~0.02–0.04 (pm_0_3um → µg/m³).
    name: "PMS5003 PM2.5 Scaling Factor"
    id: pm_2_5_scaling_factor
    min_value: 0.00001
    max_value: 2.0
    step: 0.00001
    initial_value: 1.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:scale
    web_server:
      sorting_group_id: grp_pm25
  - platform: template
    name: "PMS5003 PM2.5 Intercept"
    id: pm_2_5_intercept
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:plus-minus-variant
    web_server:
      sorting_group_id: grp_pm25
select:
  - platform: template
    name: "PMS5003 PM2.5 Batch Preset"
    id: pm_2_5_batch_preset
    options:
      - "None (manual)"
      - "PMS5003_20231030"
      - "PMS5003_20231218"
      - "PMS5003_20240104"
      - "PMS5003_20240826"
      - "PMS5003_20250116"
      - "PMS5003_20250530"
    initial_option: "None (manual)"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: mdi:format-list-bulleted
    web_server:
      sorting_group_id: grp_pm25
    set_action:
      - lambda: |-
          float s = 1.0f;
          if (x == "PMS5003_20231030")      s = 0.02838f;
          else if (x == "PMS5003_20231218") s = 0.03525f;
          else if (x == "PMS5003_20240104") s = 0.02896f;
          else if (x == "PMS5003_20240826") s = 0.03863f;
          else if (x == "PMS5003_20250116") s = 0.02983f;
          else if (x == "PMS5003_20250530") s = 0.02411f;
          id(pm_2_5_scaling_factor).make_call().set_value(s).perform();
          id(pm_2_5_intercept).make_call().set_value(0.0f).perform();
