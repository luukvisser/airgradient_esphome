# Plantower PMS5003 particulate sensor (PM1.0, PM2.5, PM10) with EPA correction algorithm.
# Default 2-minute duty cycle extends rated sensor lifespan. Configurable scaling + intercept
# calibration offsets. Depends on: pms5003_uart (UART bus from board package).
---
substitutions:
  pm_update_interval: "30s"
sensor:
  - platform: pmsx003
    # AirGradient native firmware reads every 2s (continuous active mode, fan never stops).
    # 30s keeps the fan spinning continuously while reducing HA state updates vs 1s default.
    # 2min+ causes the fan to stop between polls, requiring ~30s spin-up and causing unstable/missed readings.
    # PMS5003 https://esphome.io/components/sensor/pmsx003.html
    type: PMSX003
    uart_id: pms5003_uart
    pm_2_5:
      name: "PM2.5 Raw"
      id: pm_2_5_raw
      device_class: pm25 # Added to report properly to HomeKit
      disabled_by_default: true
      accuracy_decimals: 2
      icon: mdi:molecule
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_sensors
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm1 # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_10_0:
      name: "PM10.0"
      id: pm_10_0
      icon: mdi:molecule
      accuracy_decimals: 2
      device_class: pm10 # Added to report properly to HomeKit
      web_server:
        sorting_group_id: grp_sensors
    pm_0_3um:
      name: "PM0.3"
      id: pm_0_3um
      icon: mdi:blur
      # Particle count per 0.1L of air — integer by nature, no decimals
      accuracy_decimals: 0
      web_server:
        sorting_group_id: grp_sensors
    update_interval: $pm_update_interval
  - platform: template
    # Implements PM2.5 correction algorithm supported by AirGradient from EPA and optionally batch specific corrections
    # https://www.airgradient.com/documentation/correction-algorithms/
    # https://document.airnow.gov/airnow-fire-and-smoke-map-questions-and-answers.pdf
    name: "PM2.5"
    id: pm_2_5
    update_interval: $pm_update_interval
    device_class: pm25 # Added to report properly to HomeKit
    unit_of_measurement: µg/m³
    icon: mdi:molecule
    accuracy_decimals: 2
    state_class: measurement
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // https://www.airgradient.com/blog/low-readings-from-pms5003/
      // Correction for sensor batches after 20231030
      // Only use the batch/individual calibration if the default scaling and intercept are changed
      // Use double precision throughout to avoid losing accuracy across chained operations.
      const double pm_0_3um_raw = id(pm_0_3um).state;
      const double pm_2_5_sensor = id(pm_2_5_raw).state;
      const double humidity = id(humidity_raw).state;
      const double scaling = id(pm_2_5_scaling_factor).state;
      const double intercept = id(pm_2_5_intercept).state;
      double pm_2_5_calibrated_low = scaling * pm_0_3um_raw + intercept;
      double pm_2_5_calibrated = 0;
      if (pm_2_5_calibrated_low < 31 && (scaling != 1.0 || intercept != 0.0)) {
        pm_2_5_calibrated = pm_2_5_calibrated_low;
      } else {
        pm_2_5_calibrated = pm_2_5_sensor;
      }
      if (pm_2_5_calibrated < 0) {
        pm_2_5_calibrated = 0;
      }
      // EPA Formula
      double result = 0.0;
      if (pm_2_5_calibrated < 30.0) {
        result = (0.524 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 50.0) {
        result = (0.786 * (pm_2_5_calibrated / 20.0 - 1.5) + 0.524 * (1.0 - (pm_2_5_calibrated / 20.0 - 1.5))) * pm_2_5_calibrated - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 210.0) {
        result = (0.786 * pm_2_5_calibrated) - (0.0862 * humidity) + 5.75;
      } else if (pm_2_5_calibrated < 260.0) {
        result = (0.69 * (pm_2_5_calibrated / 50.0 - 4.2) + 0.786 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) * pm_2_5_calibrated - (0.0862 * humidity * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (2.966 * (pm_2_5_calibrated / 50.0 - 4.2)) + (5.75 * (1.0 - (pm_2_5_calibrated / 50.0 - 4.2))) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0) * (pm_2_5_calibrated / 50.0 - 4.2));
      } else {
        result = 2.966 + (0.69 * pm_2_5_calibrated) + (8.84e-4 * pow(pm_2_5_calibrated, 2.0));
      }
      if (result <= 0.0) {
        return NAN; // EPA correction formula gives unphysical result (low PM + high humidity)
      } else {
        return result;
      }
  - platform: template
    # Depends on another sensor providing an ID of pm_2_5 such as a pms5003
    name: "PM2.5 AQI"
    id: pm_2_5_aqi
    device_class: aqi
    update_interval: 5 min
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      // 2024 update from EPA https://www.epa.gov/system/files/documents/2024-02/pm-naaqs-air-quality-index-fact-sheet.pdf
      // https://en.wikipedia.org/wiki/Air_quality_index#Computing_the_AQI
      // Borrowed from https://github.com/kylemanna/sniffer/blob/master/esphome/sniffer_common.yaml
      if (isnan(id(pm_2_5).state)) return NAN;
      if (id(pm_2_5).state <= 9.0) {
      // good
      return((50.0 - 0.0) / (9.0 - 0.0) * (id(pm_2_5).state - 0.0) + 0.0);
      } else if (id(pm_2_5).state <= 35.4) {
      // moderate
      return((100.0 - 51.0) / (35.4 - 9.1) * (id(pm_2_5).state - 9.1) + 51.0);
      } else if (id(pm_2_5).state <= 55.4) {
      // usg
      return((150.0 - 101.0) / (55.4 - 35.5) * (id(pm_2_5).state - 35.5) + 101.0);
      } else if (id(pm_2_5).state <= 125.4) {
      // unhealthy
      return((200.0 - 151.0) / (125.4 - 55.5) * (id(pm_2_5).state - 55.5) + 151.0);
      } else if (id(pm_2_5).state <= 225.4) {
      // very unhealthy
      return((300.0 - 201.0) / (225.4 - 125.5) * (id(pm_2_5).state - 125.5) + 201.0);
      } else if (id(pm_2_5).state <= 325.4) {
      // hazardous
      return((400.0 - 301.0) / (325.4 - 225.5) * (id(pm_2_5).state - 225.5) + 301.0);
      } else if (id(pm_2_5).state <= 500.4) {
      // very hazardous
      return((500.0 - 401.0) / (500.4 - 325.5) * (id(pm_2_5).state - 325.5) + 401.0);
      } else {
      return(500);
      }
number:
  - platform: template
    name: "PMS5003 PM2.5 Scaling Factor"
    id: pm_2_5_scaling_factor
    min_value: 0.5
    max_value: 2.0
    step: 0.01
    initial_value: 1.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:scale
    web_server:
      sorting_group_id: grp_pm25
  - platform: template
    name: "PMS5003 PM2.5 Intercept"
    id: pm_2_5_intercept
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    initial_value: 0.0
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config
    icon: mdi:plus-minus-variant
    web_server:
      sorting_group_id: grp_pm25
