# Physical config button (GPIO9) on AirGradient ONE / Open Air hardware.
# Depends on: senseair_co2 (from sensor_s8 package) for long-press CO2 calibration,
#             factory_reset_btn (from button_factory_reset package) for 8s-hold factory reset.
# Cannot be used without those packages.
---
script:
  # Mirrors the AirGradient OneOpenAir Arduino firmware behavior: at ~2s
  # held the user is warned that continuing to hold will factory-reset; at
  # 8s held the device wipes preferences and restarts. Cancelled by
  # on_release before either deadline fires.
  - id: config_button_factory_reset_hold
    mode: single
    then:
      - delay: 2s
      - logger.log:
          level: WARN
          format: "Factory reset: keep config button pressed for 6 more seconds"
      - delay: 6s
      - logger.log:
          level: WARN
          format: "Config button held 8s — performing factory reset"
      - button.press: factory_reset_btn
binary_sensor:
  - platform: gpio
    # Binary sensor to perform action when physical config button is pressed
    # https://esphome.io/components/binary_sensor/index.html?highlight=on_multi_click
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
      ignore_strapping_warning: true # GPIO9 is a strapping pin on ESP32-C3; no external pull-up/down resistors https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins
    internal: true # Hide from displaying in HomeAssistant
    name: "Configuration Button"
    id: config_button
    on_press:
      then:
        - script.execute: config_button_factory_reset_hold
    on_release:
      then:
        - script.stop: config_button_factory_reset_hold
    on_multi_click:
      - timing: # Press and hold up to 5 seconds
          - ON for 1s to 5s
          - OFF for at least 0.5s
        then:
          - logger.log: "Starting manual CO2 calibration"
          - senseair.background_calibration: senseair_co2
          - delay: 70s
          - senseair.background_calibration_result: senseair_co2
