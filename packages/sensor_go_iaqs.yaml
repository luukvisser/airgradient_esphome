# GO IAQS Starter Score (Global Open Indoor Air Quality Score)
# https://www.airgradient.com/blog/go-iaqs-starter-score-technical-implementation
#
# Score 0–10: 10 = excellent, 0 = unhealthy
# Categories: Good (8–10), Moderate (4–7), Unhealthy (0–3)
#
# PM2.5 anchors (µg/m³ → score):  0→10, 10→8, 11→7, 25→4, 26→3, 100→0
# CO2 anchors   (ppm   → score):  400→10, 800→8, 801→7, 1400→4, 1401→3, 5000→0
#
# Combination: take the minimum per-pollutant score, then apply a synergetic
# deduction of -1 (floor 0) when the combined score is ≤ 7.

sensor:
  - platform: template
    id: go_iaqs_score
    name: "GO IAQS Score"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    update_interval: 60s
    web_server:
      sorting_group_id: grp_sensors
    lambda: |-
      float pm25 = id(pm_2_5).state;
      float co2v = id(co2).state;
      if (isnan(pm25) || isnan(co2v)) return NAN;

      // PM2.5 piecewise linear score
      int pm25_score;
      if      (pm25 <= 0.0f)   pm25_score = 10;
      else if (pm25 <= 10.0f)  pm25_score = (int)round(10.0f - 2.0f * pm25 / 10.0f);
      else if (pm25 <= 11.0f)  pm25_score = 7;
      else if (pm25 <= 25.0f)  pm25_score = (int)round(7.0f - 3.0f * (pm25 - 11.0f) / 14.0f);
      else if (pm25 <= 26.0f)  pm25_score = 3;
      else if (pm25 <= 100.0f) pm25_score = (int)round(3.0f - 3.0f * (pm25 - 26.0f) / 74.0f);
      else                     pm25_score = 0;

      // CO2 piecewise linear score
      int co2_score;
      if      (co2v <= 400.0f)  co2_score = 10;
      else if (co2v <= 800.0f)  co2_score = (int)round(10.0f - 2.0f * (co2v - 400.0f) / 400.0f);
      else if (co2v <= 801.0f)  co2_score = 7;
      else if (co2v <= 1400.0f) co2_score = (int)round(7.0f - 3.0f * (co2v - 801.0f) / 599.0f);
      else if (co2v <= 1401.0f) co2_score = 3;
      else if (co2v <= 5000.0f) co2_score = (int)round(3.0f - 3.0f * (co2v - 1401.0f) / 3599.0f);
      else                      co2_score = 0;

      // Combine: worst pollutant wins, plus synergetic deduction when both impacted
      int combined = std::min(pm25_score, co2_score);
      if (combined <= 7) combined = std::max(0, combined - 1);

      return (float)combined;
    on_value:
      - lambda: |-
          if (x >= 8.0f)      id(go_iaqs_category).publish_state("Good");
          else if (x >= 4.0f) id(go_iaqs_category).publish_state("Moderate");
          else                 id(go_iaqs_category).publish_state("Unhealthy");

text_sensor:
  - platform: template
    id: go_iaqs_category
    name: "GO IAQS Category"
    icon: "mdi:air-filter"
    update_interval: 15min
    web_server:
      sorting_group_id: grp_sensors
