# Use the local fork of esphome's sgp4x component (in components/sgp4x)
# which adds voc_raw / nox_raw outputs. The AirGradient cloud expects them
# as tvocRaw / noxRaw. Note: those "raw" values are pre-index-algorithm but
# already humidity/temperature compensated by the SGP41 chip itself via the
# RH/Temp ticks passed into MEASURE_RAW (0x2619). See components/sgp4x/sgp4x.h.
#
# `path` is resolved relative to the main config file (the device YAML at
# the repo root), not relative to this file. See ESPHome's
# external_components/__init__.py: CORE.relative_config_path(...).
external_components:
  - source:
      type: local
      path: components
    components: [sgp4x]

globals:
  - id: g_voc_learning_time
    type: int
    restore_value: true
    initial_value: '12'
  - id: g_nox_learning_time
    type: int
    restore_value: true
    initial_value: '12'

select:
  - platform: template
    name: "SGP41 VOC Learning Time Offset"
    id: voc_learning_time_offset
    options: ["12", "60", "120", "360", "720"]
    initial_option: "12"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_voc
    set_action:
      - globals.set:
          id: g_voc_learning_time
          value: !lambda 'return atoi(x.c_str());'
      - lambda: |-
          id(sgp4x_sensor).set_voc_algorithm_tuning(100, (uint16_t)atoi(x.c_str()), 12, 180, 50, 230);

  - platform: template
    name: "SGP41 NOx Learning Time Offset"
    id: nox_learning_time_offset
    options: ["12", "60", "120", "360", "720"]
    initial_option: "12"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_voc
    set_action:
      - globals.set:
          id: g_nox_learning_time
          value: !lambda 'return atoi(x.c_str());'
      - lambda: |-
          id(sgp4x_sensor).set_nox_algorithm_tuning(100, (uint16_t)atoi(x.c_str()), 12, 180, 230);

esphome:
  on_boot:
    # Priority 250 fires before hardware sensor setup (~200), so the saved
    # value from the global overrides the compiled-in default before the
    # Sensirion algorithm initialises.
    priority: 250
    then:
      - lambda: |-
          id(sgp4x_sensor).set_voc_algorithm_tuning(100, (uint16_t)id(g_voc_learning_time), 12, 180, 50, 230);
          id(sgp4x_sensor).set_nox_algorithm_tuning(100, (uint16_t)id(g_nox_learning_time), 12, 180, 230);

sensor:
  - platform: sgp4x
    id: sgp4x_sensor
    # SGP41 https://esphome.io/components/sensor/sgp4x.html
    voc:
      name: "VOC index"
      id: voc
      icon: mdi:molecule
      web_server:
        sorting_group_id: grp_sensors
    nox:
      name: "NOx index"
      id: nox
      icon: mdi:molecule
      web_server:
        sorting_group_id: grp_sensors
    voc_raw:
      name: "VOC Raw"
      id: voc_raw
      icon: mdi:molecule
      disabled_by_default: true
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_voc
    nox_raw:
      name: "NOx Raw"
      id: nox_raw
      icon: mdi:molecule
      disabled_by_default: true
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_voc
    compensation:  # Remove this block if no temp/humidity sensor present for compensation
      temperature_source: temp
      humidity_source: humidity
