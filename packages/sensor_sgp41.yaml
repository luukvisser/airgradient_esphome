# Sensirion SGP41 MOX sensor — VOC index and NOx index (0–500 scale).
# Uses on-chip algorithm with SHT40 temp/humidity compensation. Configurable learning time offsets.
# Depends on: I2C bus (from board package), temp + humidity sensors (from sensor_sht40 package).

esphome:
  on_boot:
    # Priority 250 fires before hardware sensor setup (~200), so the saved
    # value from the global overrides the compiled-in default before the
    # Sensirion algorithm initialises.
    priority: 250
    then:
      - lambda: |-
          // All parameters are Sensirion defaults except learning_time_offset_hours (user-configurable).
          // Ref: Sensirion Gas Index Algorithm Application Note
          // https://sensirion.com/media/documents/02232963/6294E210/Info_Note_SGP_Gas_Index_Algorithm.pdf
          //
          // set_voc_algorithm_tuning(index_offset=100, learning_time_offset_hours,
          //   gating_max_duration_minutes=12, std_initial=180, gain_factor=50, gating_max_ratio=230)
          id(sgp4x_sensor).set_voc_algorithm_tuning(100, (uint16_t)id(g_voc_learning_time), 12, 180, 50, 230);
          // set_nox_algorithm_tuning(index_offset=100, learning_time_offset_hours,
          //   gating_max_duration_minutes=12, std_initial=180, gain_factor=230)
          id(sgp4x_sensor).set_nox_algorithm_tuning(100, (uint16_t)id(g_nox_learning_time), 12, 180, 230);

globals:
  - id: g_voc_learning_time
    type: int
    restore_value: true
    initial_value: '12'
  - id: g_nox_learning_time
    type: int
    restore_value: true
    initial_value: '12'

sensor:
  - platform: sgp4x
    id: sgp4x_sensor
    # SGP41 https://esphome.io/components/sensor/sgp4x.html
    voc:
      name: "VOC index"
      id: voc
      icon: mdi:molecule
      web_server:
        sorting_group_id: grp_sensors
    nox:
      name: "NOx index"
      id: nox
      icon: mdi:molecule
      web_server:
        sorting_group_id: grp_sensors
    compensation:  # Remove this block if no temp/humidity sensor present for compensation
      temperature_source: temp
      humidity_source: humidity

select:
  - platform: template
    name: "SGP41 VOC Learning Time Offset"
    id: voc_learning_time_offset
    options: ["12", "60", "120", "360", "720"]
    initial_option: "12"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_voc
    set_action:
      - globals.set:
          id: g_voc_learning_time
          value: !lambda 'return atoi(x.c_str());'
      - lambda: |-
          id(sgp4x_sensor).set_voc_algorithm_tuning(100, (uint16_t)atoi(x.c_str()), 12, 180, 50, 230);

  - platform: template
    name: "SGP41 NOx Learning Time Offset"
    id: nox_learning_time_offset
    options: ["12", "60", "120", "360", "720"]
    initial_option: "12"
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_voc
    set_action:
      - globals.set:
          id: g_nox_learning_time
          value: !lambda 'return atoi(x.c_str());'
      - lambda: |-
          id(sgp4x_sensor).set_nox_algorithm_tuning(100, (uint16_t)atoi(x.c_str()), 12, 180, 230);
